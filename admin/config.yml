backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "settings"
    label: "Blog CMS"
    files:
      - name: "posts"
        label: "Blog Posts"
        file: "cms/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
              - { label: "Read Time", name: "readTime", widget: "string", default: "4 min read" }
              - { label: "URL", name: "url", widget: "string", default: "#contact" }
              - label: "Translations"
                name: "translations"
                widget: "object"
                collapsed: true
                required: false
                fields:
                  - label: "French"
                    name: "fr"
                    widget: "object"
                    collapsed: true
                    required: false
                    fields:
                      - { label: "Title", name: "title", widget: "string", required: false }
                      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
                      - { label: "Category", name: "category", widget: "string", required: false }
                      - { label: "Read Time", name: "readTime", widget: "string", required: false }
                  - label: "Spanish"
                    name: "es"
                    widget: "object"
                    collapsed: true
                    required: false
                    fields:
                      - { label: "Title", name: "title", widget: "string", required: false }
                      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
                      - { label: "Category", name: "category", widget: "string", required: false }
                      - { label: "Read Time", name: "readTime", widget: "string", required: false }
